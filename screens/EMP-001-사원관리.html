<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMP-001 사원관리 | SERO Framework</title>
<!--
  ═══════════════════════════════════════════════════════════════
  SERO Design System Export (테스트용 시뮬레이션)
  화면ID: EMP-001 / 화면명: 사원관리
  각 컴포넌트는 data-sero-component / data-sero-id 로 태깅됨
  ═══════════════════════════════════════════════════════════════
-->
<style>
  :root{
    --sero-primary:#1B4F9C; --sero-primary-dark:#123A75; --sero-primary-light:#EAF1FB;
    --sero-accent:#0FA3A3;
    --sero-text:#1F2937; --sero-text-sub:#6B7280;
    --sero-border:#D8DEE8; --sero-bg:#F4F6FA; --sero-white:#FFFFFF;
    --sero-danger:#C43D3D; --sero-radius:6px;
    --sero-font:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sero-font);background:var(--sero-bg);color:var(--sero-text);font-size:14px}
  .sero-container{max-width:1200px;margin:0 auto;padding:24px}

  /* ── SeroPageHeader ── */
  .sero-page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px}
  .sero-page-header .breadcrumb{font-size:12px;color:var(--sero-text-sub);margin-bottom:6px}
  .sero-page-header h1{font-size:22px;font-weight:700;letter-spacing:-0.02em}
  .sero-page-header h1::before{content:"";display:inline-block;width:4px;height:18px;background:var(--sero-primary);margin-right:10px;border-radius:2px}
  .sero-page-header .screen-id{font-size:12px;color:var(--sero-text-sub);background:var(--sero-white);border:1px solid var(--sero-border);padding:4px 10px;border-radius:12px}

  /* ── SeroSearchForm ── */
  .sero-search-form{background:var(--sero-white);border:1px solid var(--sero-border);border-radius:var(--sero-radius);padding:18px 20px;display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
  .sero-field{display:flex;flex-direction:column;gap:6px}
  .sero-field label{font-size:12px;font-weight:600;color:var(--sero-text-sub)}
  .sero-field select,.sero-field input{height:36px;border:1px solid var(--sero-border);border-radius:var(--sero-radius);padding:0 10px;font-family:inherit;font-size:14px;min-width:160px;background:var(--sero-white)}
  .sero-field select:focus,.sero-field input:focus{outline:2px solid var(--sero-primary-light);border-color:var(--sero-primary)}
  .sero-search-form .actions{margin-left:auto;display:flex;gap:8px}

  /* ── SeroButton ── */
  .sero-btn{height:36px;padding:0 16px;border-radius:var(--sero-radius);border:1px solid var(--sero-border);background:var(--sero-white);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
  .sero-btn:hover{background:var(--sero-bg)}
  .sero-btn--primary{background:var(--sero-primary);border-color:var(--sero-primary);color:#fff}
  .sero-btn--primary:hover{background:var(--sero-primary-dark)}
  .sero-btn--danger{color:var(--sero-danger);border-color:var(--sero-danger)}
  .sero-btn--danger:hover{background:#FBEFEF}
  .sero-btn:disabled{opacity:.45;cursor:not-allowed}

  /* ── SeroGrid ── */
  .sero-grid-wrap{background:var(--sero-white);border:1px solid var(--sero-border);border-radius:var(--sero-radius);overflow:hidden}
  .sero-grid-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--sero-border)}
  .sero-grid-toolbar .count{font-size:13px;color:var(--sero-text-sub)}
  .sero-grid-toolbar .count strong{color:var(--sero-primary)}
  .sero-grid{width:100%;border-collapse:collapse}
  .sero-grid th{background:#F0F3F8;font-size:13px;font-weight:600;color:var(--sero-text-sub);padding:10px 14px;text-align:left;border-bottom:1px solid var(--sero-border);cursor:pointer;user-select:none;white-space:nowrap}
  .sero-grid th .arrow{font-size:10px;color:var(--sero-primary);margin-left:4px}
  .sero-grid td{padding:11px 14px;border-bottom:1px solid #EEF1F6;font-size:14px}
  .sero-grid tbody tr{cursor:pointer}
  .sero-grid tbody tr:hover{background:#F8FAFD}
  .sero-grid tbody tr.selected{background:var(--sero-primary-light)}
  .sero-badge{display:inline-block;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px}
  .sero-badge--active{background:#E6F6F0;color:#0E7A55}
  .sero-badge--leave{background:#FFF4E0;color:#9A6A00}
  .sero-badge--retired{background:#F1F2F5;color:#6B7280}

  /* ── SeroPagination ── */
  .sero-pagination{display:flex;justify-content:center;gap:6px;padding:14px}
  .sero-pagination button{min-width:32px;height:32px;border:1px solid var(--sero-border);background:var(--sero-white);border-radius:var(--sero-radius);cursor:pointer;font-family:inherit;font-size:13px}
  .sero-pagination button.current{background:var(--sero-primary);border-color:var(--sero-primary);color:#fff;font-weight:700}

  /* ── SeroButtonGroup(하단) ── */
  .sero-btn-group{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}

  /* ── SeroModal ── */
  .sero-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(17,24,39,.45);align-items:center;justify-content:center;z-index:100}
  .sero-modal-backdrop.open{display:flex}
  .sero-modal{background:var(--sero-white);border-radius:10px;width:440px;max-width:92vw;box-shadow:0 20px 50px rgba(0,0,0,.25)}
  .sero-modal header{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--sero-border)}
  .sero-modal header h2{font-size:16px;font-weight:700}
  .sero-modal header .close{border:none;background:none;font-size:18px;cursor:pointer;color:var(--sero-text-sub)}
  .sero-modal .body{padding:20px 22px;display:flex;flex-direction:column;gap:14px}
  .sero-modal .body .sero-field input,.sero-modal .body .sero-field select{width:100%}
  .sero-field .req::after{content:" *";color:var(--sero-danger)}
  .sero-field .error-msg{font-size:12px;color:var(--sero-danger);display:none}
  .sero-field.invalid input{border-color:var(--sero-danger)}
  .sero-field.invalid .error-msg{display:block}
  .sero-modal footer{display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;border-top:1px solid var(--sero-border)}

  /* ── SeroToast ── */
  .sero-toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1F2937;color:#fff;padding:12px 22px;border-radius:8px;font-size:14px;opacity:0;transition:all .25s;pointer-events:none}
  .sero-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="sero-container">

  <!-- 페이지 헤더 -->
  <div class="sero-page-header" data-sero-component="SeroPageHeader" data-sero-id="header-emp">
    <div>
      <div class="breadcrumb">인사관리 &gt; 기준정보 &gt; 사원관리</div>
      <h1>사원관리</h1>
    </div>
    <span class="screen-id">EMP-001</span>
  </div>

  <!-- 검색 조건 -->
  <div class="sero-search-form" data-sero-component="SeroSearchForm" data-sero-id="search-emp">
    <div class="sero-field" data-sero-component="SeroSelect" data-sero-id="search-dept">
      <label for="fDept">부서</label>
      <select id="fDept">
        <option value="">전체</option>
        <option>개발1팀</option><option>개발2팀</option><option>기획팀</option><option>인사팀</option>
      </select>
    </div>
    <div class="sero-field" data-sero-component="SeroInput" data-sero-id="search-name">
      <label for="fName">사원명</label>
      <input id="fName" type="text" placeholder="사원명 입력">
    </div>
    <div class="sero-field" data-sero-component="SeroSelect" data-sero-id="search-status">
      <label for="fStatus">재직상태</label>
      <select id="fStatus">
        <option value="">전체</option><option>재직</option><option>휴직</option><option>퇴직</option>
      </select>
    </div>
    <div class="actions">
      <button class="sero-btn" data-sero-component="SeroButton" data-sero-id="btn-reset" onclick="resetSearch()">초기화</button>
      <button class="sero-btn sero-btn--primary" data-sero-component="SeroButton" data-sero-id="btn-search" onclick="applySearch()">조회</button>
    </div>
  </div>

  <!-- 사원 목록 그리드 -->
  <div class="sero-grid-wrap" data-sero-component="SeroGrid" data-sero-id="grid-employee">
    <div class="sero-grid-toolbar">
      <span class="count">총 <strong id="rowCount">0</strong>건</span>
      <button class="sero-btn" data-sero-component="SeroButton" data-sero-id="btn-excel" onclick="toast('엑셀 다운로드는 프로토타입에서 미구현입니다')">엑셀 다운로드</button>
    </div>
    <table class="sero-grid">
      <thead>
        <tr>
          <th data-key="empNo">사원번호<span class="arrow"></span></th>
          <th data-key="name">사원명<span class="arrow"></span></th>
          <th data-key="dept">부서<span class="arrow"></span></th>
          <th data-key="grade">직급<span class="arrow"></span></th>
          <th data-key="joinDate">입사일<span class="arrow"></span></th>
          <th data-key="status">재직상태<span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="gridBody"></tbody>
    </table>
    <div class="sero-pagination" data-sero-component="SeroPagination" data-sero-id="page-employee">
      <button onclick="toast('이전 페이지 (프로토타입)')">&laquo;</button>
      <button class="current">1</button><button>2</button><button>3</button>
      <button onclick="toast('다음 페이지 (프로토타입)')">&raquo;</button>
    </div>
  </div>

  <!-- 하단 액션 버튼 -->
  <div class="sero-btn-group" data-sero-component="SeroButtonGroup" data-sero-id="actions-emp">
    <button class="sero-btn sero-btn--primary" data-sero-component="SeroButton" data-sero-id="btn-new" onclick="openModal()">신규</button>
    <button class="sero-btn" id="btnEdit" data-sero-component="SeroButton" data-sero-id="btn-edit" disabled onclick="toast('수정 화면은 프로토타입에서 미구현입니다')">수정</button>
    <button class="sero-btn sero-btn--danger" id="btnDelete" data-sero-component="SeroButton" data-sero-id="btn-delete" disabled onclick="deleteRow()">삭제</button>
  </div>
</div>

<!-- 신규 등록 모달 -->
<div class="sero-modal-backdrop" id="modalBackdrop">
  <div class="sero-modal" data-sero-component="SeroModal" data-sero-id="modal-emp-new" role="dialog" aria-modal="true">
    <header>
      <h2>신규 사원 등록</h2>
      <button class="close" onclick="closeModal()">✕</button>
    </header>
    <div class="body">
      <div class="sero-field" id="mNameField" data-sero-component="SeroInput" data-sero-id="modal-name">
        <label class="req" for="mName">사원명</label>
        <input id="mName" type="text" placeholder="사원명을 입력하세요">
        <span class="error-msg">사원명은 필수 입력 항목입니다.</span>
      </div>
      <div class="sero-field" data-sero-component="SeroSelect" data-sero-id="modal-dept">
        <label for="mDept">부서</label>
        <select id="mDept"><option>개발1팀</option><option>개발2팀</option><option>기획팀</option><option>인사팀</option></select>
      </div>
      <div class="sero-field" data-sero-component="SeroSelect" data-sero-id="modal-grade">
        <label for="mGrade">직급</label>
        <select id="mGrade"><option>사원</option><option>대리</option><option>과장</option><option>차장</option><option>부장</option></select>
      </div>
      <div class="sero-field" data-sero-component="SeroDatePicker" data-sero-id="modal-join-date">
        <label for="mJoin">입사일</label>
        <input id="mJoin" type="date">
      </div>
    </div>
    <footer>
      <button class="sero-btn" onclick="closeModal()">취소</button>
      <button class="sero-btn sero-btn--primary" data-sero-component="SeroButton" data-sero-id="btn-modal-save" onclick="saveEmployee()">저장</button>
    </footer>
  </div>
</div>

<div class="sero-toast" id="toast" data-sero-component="SeroToast" data-sero-id="toast-global"></div>

<script>
/* ── 프로토타입 목업 데이터 & 인터랙션 (실서비스 로직 아님) ── */
let data = [
  {empNo:"E2019001", name:"김서연", dept:"개발1팀", grade:"과장", joinDate:"2019-03-04", status:"재직"},
  {empNo:"E2020014", name:"박지훈", dept:"개발2팀", grade:"대리", joinDate:"2020-07-13", status:"재직"},
  {empNo:"E2018007", name:"이하늘", dept:"기획팀",  grade:"차장", joinDate:"2018-01-08", status:"휴직"},
  {empNo:"E2021032", name:"최민준", dept:"개발1팀", grade:"사원", joinDate:"2021-11-01", status:"재직"},
  {empNo:"E2016003", name:"정수아", dept:"인사팀",  grade:"부장", joinDate:"2016-05-16", status:"재직"},
  {empNo:"E2017011", name:"한도윤", dept:"개발2팀", grade:"과장", joinDate:"2017-09-25", status:"퇴직"},
  {empNo:"E2022045", name:"오유진", dept:"기획팀",  grade:"사원", joinDate:"2022-02-14", status:"재직"}
];
let view = [...data], selected = null, sortKey = null, sortAsc = true;

const badge = s => `<span class="sero-badge sero-badge--${s==="재직"?"active":s==="휴직"?"leave":"retired"}">${s}</span>`;

function render(){
  const tb = document.getElementById("gridBody");
  tb.innerHTML = view.map(r => `
    <tr data-empno="${r.empNo}" class="${selected===r.empNo?'selected':''}" onclick="selectRow('${r.empNo}')">
      <td>${r.empNo}</td><td>${r.name}</td><td>${r.dept}</td>
      <td>${r.grade}</td><td>${r.joinDate}</td><td>${badge(r.status)}</td>
    </tr>`).join("");
  document.getElementById("rowCount").textContent = view.length;
  const has = !!selected;
  document.getElementById("btnEdit").disabled = !has;
  document.getElementById("btnDelete").disabled = !has;
}
function selectRow(no){ selected = (selected===no) ? null : no; render(); }
function applySearch(){
  const d=fDept.value, n=fName.value.trim(), s=fStatus.value;
  view = data.filter(r => (!d||r.dept===d) && (!n||r.name.includes(n)) && (!s||r.status===s));
  selected=null; render(); toast(`조회 완료: ${view.length}건`);
}
function resetSearch(){ fDept.value=""; fName.value=""; fStatus.value=""; view=[...data]; selected=null; render(); }
document.querySelectorAll(".sero-grid th").forEach(th=>{
  th.addEventListener("click",()=>{
    const k=th.dataset.key;
    sortAsc = (sortKey===k) ? !sortAsc : true; sortKey=k;
    view.sort((a,b)=> (a[k]>b[k]?1:-1) * (sortAsc?1:-1));
    document.querySelectorAll(".sero-grid th .arrow").forEach(a=>a.textContent="");
    th.querySelector(".arrow").textContent = sortAsc?"▲":"▼";
    render();
  });
});
function openModal(){ modalBackdrop.classList.add("open"); mName.value=""; mJoin.value=""; mNameField.classList.remove("invalid"); }
function closeModal(){ modalBackdrop.classList.remove("open"); }
function saveEmployee(){
  if(!mName.value.trim()){ mNameField.classList.add("invalid"); mName.focus(); return; }
  const no = "E" + new Date().getFullYear() + String(Math.floor(Math.random()*900)+100);
  data.unshift({empNo:no, name:mName.value.trim(), dept:mDept.value, grade:mGrade.value, joinDate:mJoin.value||"-", status:"재직"});
  view=[...data]; closeModal(); render(); toast(`저장 완료: ${no}`);
}
function deleteRow(){
  if(!selected) return;
  if(confirm("선택한 사원을 삭제하시겠습니까?")){
    data = data.filter(r=>r.empNo!==selected);
    view = view.filter(r=>r.empNo!==selected);
    selected=null; render(); toast("삭제되었습니다");
  }
}
let toastTimer;
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}
render();
</script>
</body>
</html>
